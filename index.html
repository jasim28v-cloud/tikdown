<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKDOWN PRO | ULTIMATE EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fe2c55;
            --secondary: #25f4ee;
            --bg-dark: #020205;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 5% 5%, rgba(254, 44, 85, 0.15) 0%, transparent 30%),
                              radial-gradient(circle at 95% 95%, rgba(37, 244, 238, 0.15) 0%, transparent 30%);
        }
        .ultra-card {
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 50px 30px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 50px 150px rgba(0,0,0,0.9);
        }
        .logo { font-size: 3rem; font-weight: 900; background: linear-gradient(45deg, var(--primary), #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        input { width: 100%; padding: 22px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 25px; color: #fff; font-size: 1.1rem; text-align: center; outline: none; margin-bottom: 25px; box-sizing: border-box; }
        .action-btn { background: linear-gradient(90deg, var(--primary), #ff4b2b); color: #fff; border: none; padding: 22px; width: 100%; border-radius: 25px; font-size: 1.3rem; font-weight: 900; cursor: pointer; transition: 0.4s; }
        #resultArea { margin-top: 40px; display: none; }
        video { width: 100%; border-radius: 30px; border: 1px solid var(--border); }
        .dl-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .dl-btn { padding: 18px; border-radius: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; color: #000; }
        .v-btn { background: #fff; }
        .a-btn { background: var(--secondary); }
        .loader { width: 30px; height: 30px; border: 4px solid #fff; border-top-color: transparent; border-radius: 50%; display: none; animation: spin 0.8s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="ultra-card">
        <div class="logo">TIKDOWN PRO</div>
        <div class="subtitle">نظام سحب الميديا العالمي 🔥</div>
        <input type="text" id="urlInput" placeholder="ضع رابط الفيديو هنا...">
        <button class="action-btn" id="mainBtn" onclick="startMission()">
            <span id="btnText">بدأ السحب الرقمي 🔥</span>
            <div class="loader" id="loader"></div>
        </button>
        <div id="resultArea">
            <video id="videoPreview" controls></video>
            <div class="dl-group">
                <a id="downloadVideo" href="" class="dl-btn v-btn" target="_blank"><i class="fas fa-video"></i> MP4</a>
                <a id="downloadAudio" href="" class="dl-btn a-btn" target="_blank"><i class="fas fa-music"></i> MP3</a>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = "https://tikdown-6go7.onrender.com"; 
        async function startMission() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url) return alert("أدخل الرابط!");
            document.getElementById('btnText').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch(`${API_BASE}/api/extract?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if(data.success) {
                    document.getElementById('videoPreview').src = data.url;
                    document.getElementById('downloadVideo').href = data.url;
                    document.getElementById('downloadAudio').href = data.url;
                    document.getElementById('resultArea').style.display = 'block';
                } else { alert("فشل المحرك: " + data.error); }
            } catch (err) { alert("المحرك لا يستجيب حالياً."); }
            finally { document.getElementById('btnText').style.display = 'block'; document.getElementById('loader').style.display = 'none'; }
        }
    </script>
</body>
</html>
