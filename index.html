<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKDOWN PRO | ULTIMATE EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #fe2c55; --secondary: #25f4ee; --bg-dark: #020205;
            --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: var(--bg-dark); color: #fff; font-family: 'Cairo', sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle at 5% 5%, rgba(254, 44, 85, 0.1) 0%, transparent 30%);
        }
        .ultra-card {
            background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--border);
            border-radius: 40px; padding: 40px; width: 90%; max-width: 600px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 25px 0; }
        .tab { padding: 10px; border-radius: 15px; background: rgba(255,255,255,0.05); cursor: pointer; font-size: 0.8rem; transition: 0.3s; border: 1px solid transparent; }
        .tab.active { border-color: var(--secondary); background: rgba(37, 244, 238, 0.1); }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; text-align: center; margin-bottom: 20px; outline: none; }
        .action-btn { width: 100%; padding: 18px; border-radius: 20px; background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #resultArea { display: none; margin-top: 30px; animation: fadeIn 0.5s; }
        video { width: 100%; border-radius: 20px; margin-bottom: 15px; }
        .download-links { display: flex; gap: 10px; }
        .dl-btn { flex: 1; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .v-btn { background: #fff; color: #000; }
        .a-btn { background: var(--secondary); color: #000; }
        .loader { display: none; width: 25px; height: 25px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="ultra-card">
        <div class="logo">TIKDOWN PRO</div>
        <p style="color: #666;">الجيل القادم من سحب الميديا</p>

        <div class="tabs">
            <div class="tab active" data-type="tiktok"><i class="fab fa-tiktok"></i></div>
            <div class="tab" data-type="youtube"><i class="fab fa-youtube"></i></div>
            <div class="tab" data-type="instagram"><i class="fab fa-instagram"></i></div>
            <div class="tab" data-type="facebook"><i class="fab fa-facebook"></i></div>
            <div class="tab" data-type="x"><i class="fab fa-x-twitter"></i></div>
        </div>

        <input type="text" id="urlInput" placeholder="ضع الرابط هنا لفك التشفير...">
        
        <button class="action-btn" id="mainBtn" onclick="startMission()">بدأ السحب الرقمي 🔥</button>
        <div class="loader" id="loader"></div>

        <div id="resultArea">
            <h4 id="videoTitle" style="font-size: 0.9rem; margin-bottom: 15px;"></h4>
            <video id="videoPreview" controls poster=""></video>
            <div class="download-links">
                <a id="downloadVideo" href="" class="dl-btn v-btn" target="_blank">تحميل فيديو MP4</a>
                <a id="downloadAudio" href="" class="dl-btn a-btn" target="_blank">تحميل صوت MP3</a>
            </div>
        </div>
    </div>

    <script>
        // رابط سيرفر الـ Backend الخاص بك بعد الرفع
        const API_BASE = "https://your-server-link.onrender.com"; 

        async function startMission() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url) return alert("أدخل الرابط أولاً!");

            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/extract?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if(data.success) {
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('videoPreview').src = data.url;
                    document.getElementById('videoPreview').poster = data.thumbnail;
                    document.getElementById('downloadVideo').href = data.url;
                    document.getElementById('downloadAudio').href = data.url; // يمكن تحسينه لتحميل صوت فقط
                    document.getElementById('resultArea').style.display = 'block';
                } else {
                    alert("فشل الاستخراج: " + data.error);
                }
            } catch (err) {
                alert("خطأ في الاتصال بالسيرفر الخلفي!");
            } finally {
                document.getElementById('mainBtn').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
